<header>
    <div class="container nav">
        <div class="logo">Jubar's DNA Labs</div>

            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="how-it-works.html">How It Works</a>
            <a href="faq.html">FAQ</a>
        </nav>

</header>

<section class="services">
    <div class="container">
        <h2>Schedule Your DNA Test</h2>

        <p>Please fill out the form below and we will contact you to confirm your appointment.</p>

        <form>
            <input type="text" placeholder="Full Name" required><br><br>
            <input type="email" placeholder="Email Address" required><br><br>
            <input type="tel" placeholder="Phone Number" required><br><br>

            <select required>
                <option>Select Test Type</option>
                <option>Paternity Testing</option>
                <option>Court-Admissible Testing</option>
                <option>Prenatal Testing</option>
            </select><br><br>

            <textarea placeholder="Additional Notes"></textarea><br><br>

            <button class="btn-primary">Submit Request</button>
        </form>
    </div>
</section>

<footer>
    <div class="container">
